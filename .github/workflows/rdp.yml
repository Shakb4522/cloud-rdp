name: Windows Cloud RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:

      - name: Enable Remote Desktop
        shell: powershell
        run: |

          # Enable RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0

          # Enable firewall rules
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Keep NLA enabled for better security
          Set-ItemProperty -Path `
            'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 1

          # Restart service
          Restart-Service TermService -Force

      - name: Create RDP User
        shell: powershell
        run: |

          $password = "RDP@" + (Get-Random -Minimum 100000 -Maximum 999999)

          $secure = ConvertTo-SecureString $password -AsPlainText -Force

          New-LocalUser `
            -Name "RDP" `
            -Password $secure `
            -AccountNeverExpires

          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        shell: powershell
        run: |

          Invoke-WebRequest `
            https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi `
            -OutFile tailscale.msi

          Start-Process msiexec.exe `
            -ArgumentList "/i tailscale.msi /quiet /norestart" `
            -Wait

      - name: Start Tailscale
        shell: powershell
        run: |

          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
            --hostname="github-rdp-${{ github.run_id }}"

      - name: Get Tailscale IP
        shell: powershell
        run: |

          $ip = ""

          for ($i=0; $i -lt 20; $i++) {

            $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

            if ($ip) {
              break
            }

            Start-Sleep 5
          }

          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

      - name: Show RDP Info
        shell: powershell
        run: |

          Write-Host ""
          Write-Host "==========================="
          Write-Host "RDP READY"
          Write-Host "==========================="
          Write-Host "IP: $env:TAILSCALE_IP"
          Write-Host "User: RDP"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "==========================="
          Write-Host ""

      - name: Keep VM Alive
        shell: powershell
        run: |

          Start-Sleep -Seconds 216000
