- name: Create RDP User
  shell: powershell
  run: |

    Write-Host "Creating RDP User..."

    # Strong password
    $Upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".ToCharArray() | Get-Random -Count 4
    $Lower = "abcdefghijklmnopqrstuvwxyz".ToCharArray() | Get-Random -Count 4
    $Number = "0123456789".ToCharArray() | Get-Random -Count 4
    $Special = "!@#$%^&*()_+".ToCharArray() | Get-Random -Count 4

    $All = $Upper + $Lower + $Number + $Special

    $password = -join ($All | Sort-Object {Get-Random})

    $securePassword = ConvertTo-SecureString `
      $password `
      -AsPlainText `
      -Force

    # Remove old user if exists
    $oldUser = Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue

    if ($oldUser) {
        Remove-LocalUser -Name "RDP"
    }

    # Create user
    New-LocalUser `
      -Name "RDP" `
      -Password $securePassword `
      -AccountNeverExpires

    # Add permissions
    Add-LocalGroupMember `
      -Group "Administrators" `
      -Member "RDP"

    Add-LocalGroupMember `
      -Group "Remote Desktop Users" `
      -Member "RDP"

    echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

    Write-Host "User Created Successfully"
