name: Windows Cloud RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:

      - name: Enable Remote Desktop
        shell: powershell
        run: |

          Write-Host "Enabling Remote Desktop..."

          # Enable RDP
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" `
            -Value 0

          # Enable firewall rules
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Enable Network Level Authentication
          Set-ItemProperty `
            -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" `
            -Value 1

          # Restart RDP service
          Restart-Service TermService -Force

          Write-Host "RDP Enabled Successfully"

      - name: Create RDP User
        shell: powershell
        run: |

          Write-Host "Creating RDP User..."

          # Generate strong password
          $Upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".ToCharArray() | Get-Random -Count 4
          $Lower = "abcdefghijklmnopqrstuvwxyz".ToCharArray() | Get-Random -Count 4
          $Number = "0123456789".ToCharArray() | Get-Random -Count 4
          $Special = "!@#$%^&*()_+".ToCharArray() | Get-Random -Count 4

          $All = $Upper + $Lower + $Number + $Special

          $password = -join ($All | Sort-Object {Get-Random})

          $securePassword = ConvertTo-SecureString `
            $password `
            -AsPlainText `
            -Force

          # Remove old user if exists
          $oldUser = Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue

          if ($oldUser) {
              Remove-LocalUser -Name "RDP"
          }

          # Create new user
          New-LocalUser `
            -Name "RDP" `
            -Password $securePassword `
            -AccountNeverExpires

          # Add to admin group
          Add-LocalGroupMember `
            -Group "Administrators" `
            -Member "RDP"

          # Add to RDP group
          Add-LocalGroupMember `
            -Group "Remote Desktop Users" `
            -Member "RDP"

          # Save password
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

          Write-Host "User Created Successfully"

      - name: Install Chocolatey
        shell: powershell
        run: |

          Set-ExecutionPolicy Bypass -Scope Process -Force

          [System.Net.ServicePointManager]::SecurityProtocol = `
            [System.Net.ServicePointManager]::SecurityProtocol -bor 3072

          Invoke-Expression (
            (New-Object System.Net.WebClient).DownloadString(
              'https://community.chocolatey.org/install.ps1'
            )
          )

      - name: Install Apps
        shell: powershell
        run: |

          choco install googlechrome -y
          choco install vscode -y
          choco install 7zip -y

      - name: Install Tailscale
        shell: powershell
        run: |

          Write-Host "Installing Tailscale..."

          Invoke-WebRequest `
            -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi" `
            -OutFile "$env:TEMP\tailscale.msi"

          Start-Process `
            msiexec.exe `
            -ArgumentList "/i `"$env:TEMP\tailscale.msi`" /quiet /norestart" `
            -Wait

          Write-Host "Tailscale Installed"

      - name: Connect Tailscale
        shell: powershell
        run: |

          Write-Host "Connecting Tailscale..."

          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
            --hostname="github-rdp-${{ github.run_id }}"

          Write-Host "Waiting For Tailscale IP..."

          $tailscaleIP = $null

          for ($i = 0; $i -lt 30; $i++) {

              $tailscaleIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

              if ($tailscaleIP) {
                  break
              }

              Start-Sleep -Seconds 5
          }

          if (-not $tailscaleIP) {
              Write-Error "Failed To Get Tailscale IP"
              exit 1
          }

          echo "TAILSCALE_IP=$tailscaleIP" >> $env:GITHUB_ENV

          Write-Host "Connected Successfully"

      - name: Test RDP Port
        shell: powershell
        run: |

          Write-Host "Testing RDP Port..."

          $result = Test-NetConnection `
            -ComputerName $env:TAILSCALE_IP `
            -Port 3389

          if ($result.TcpTestSucceeded) {
              Write-Host "RDP Port Working"
          }
          else {
              Write-Error "RDP Port Failed"
              exit 1
          }

      - name: Show Connection Info
        shell: powershell
        run: |

          Write-Host ""
          Write-Host "======================================="
          Write-Host "          WINDOWS CLOUD RDP"
          Write-Host "======================================="
          Write-Host ""
          Write-Host "IP ADDRESS:"
          Write-Host "$env:TAILSCALE_IP"
          Write-Host ""
          Write-Host "USERNAME:"
          Write-Host "RDP"
          Write-Host ""
          Write-Host "PASSWORD:"
          Write-Host "$env:RDP_PASSWORD"
          Write-Host ""
          Write-Host "WINDOWS:"
          Write-Host "Windows Server 2022"
          Write-Host ""
          Write-Host "STATUS:"
          Write-Host "READY FOR CONNECTION"
          Write-Host ""
          Write-Host "======================================="

      - name: Keep VM Alive
        shell: powershell
        run: |

          Write-Host ""
          Write-Host "Keeping VM Alive..."
          Write-Host "Workflow Will Stay Active"
          Write-Host ""

          # Keep alive ~60 hours
          Start-Sleep -Seconds 216000
